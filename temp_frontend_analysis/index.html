<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ScraperOS Control Panel</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#EB4425",
                        "background-light": "#F0F4F8",
                        "background-dark": "#0f172a",
                        "panel-light": "#FFFFFF",
                        "panel-dark": "rgba(30, 41, 59, 0.4)",
                        "text-light": "#4a5568",
                        "text-dark": "#f8fafc",
                        "accent-blue": "#6789BE",
                        "neon-blue": "#00f0ff",
                        "neon-green": "#39ff14",
                    },
                    fontFamily: {
                        display: ["Outfit", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.0rem", // Updated to match new designs
                        'xl': '1.25rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem',
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(235, 68, 37, 0.3)',
                    }
                },
            },
        };
    </script>
    <style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card-dark {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-card-light {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .dark .glass-card {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }

        .form-input {
            @apply w-full bg-white dark:bg-gray-800/50 border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-300 dark:text-white dark:placeholder-gray-400 hover:shadow-md hover:border-gray-300 dark:hover:border-gray-500;
        }

        .tag-badge {
            @apply bg-primary/10 text-primary dark:bg-primary/20 dark:text-orange-200 px-3 py-1 rounded-lg text-xs font-semibold flex items-center gap-1 border border-primary/20;
        }

        .step-connector {
            position: absolute;
            left: 10px;
            top: 24px;
            bottom: -16px;
            width: 2px;
            background-color: rgba(255, 255, 255, 0.2);
            z-index: 0;
        }

        .step-item:last-child .step-connector {
            display: none;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display antialiased h-screen overflow-hidden text-text-light dark:text-text-dark transition-colors duration-300">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
